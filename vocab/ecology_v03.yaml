# Ancient Ecology Vocabulary v0.3
#
# Controlled vocabulary for evidence-graded annotation of environmental
# and infrastructural claims in ancient Nile Valley texts (500 BCE–300 CE).
#
# v0.3 changes from v0.2:
#   - Integrated Bonneau (1993) Part 1 terminology — all infrastructure terms
#     that have their own TOC heading are now represented
#   - Corrected source_term assignments using Bonneau's definitions
#     (e.g., emblema = transverse dike, not sluice; thyra = sluice gate)
#   - Split water-lifting devices into distinct types per Bonneau Part 1.C.3
#   - Added waterway sub-types: inlet, outlet, depression channel, conduit
#   - Added dike sub-types: cross-dike, field ridge
#   - Added distribution infrastructure: water release, deliberate dike cut
#   - Expanded personnel from Bonneau Part 2 (dike builder, surveyor,
#     nilometer reader, basin manager)
#   - Added management practices from Bonneau Part 2 (de-silting,
#     vegetation clearing, basin irrigation)
#   - All v0.1 and v0.2 IDs preserved (IDs are stable, never reused)
#
# Sources:
#   - Bonneau, Le régime administratif de l'eau du Nil (Brill, 1993)
#     Part 1 "La Terminologie" (p.23-137): infrastructure terms
#     Part 2 "Le Fonctionnement" (p.139-255): operations & personnel
#     Greek index (p.351-358): attestation cross-references
#   - Pleiades place types: pleiades.stoa.org/vocabularies/place-types
#   - Trismegistos GEO status: trismegistos.org/geo/about_status.php
#   - Abdelwahed & Shehata, "Nile Water Management" (Rosetta 27, 2022)
#
# Methodology:
#   See vocab/METHODOLOGY.md for full provenance of how this vocabulary
#   was constructed.

version: "0.3"
description: >
  Label set for extraction/classification of ecological and infrastructural
  knowledge in ancient Nile Valley texts (500 BCE–300 CE). Functions as
  both the ML label set and a durable semantic layer for linked-data
  interoperability. Greek/Latin/Egyptian source terms are drawn from
  Bonneau (1993) and Trismegistos GEO, enabling matching against
  original-language passages.

domains:

  # ===================================================================
  # HYDRAULIC FEATURES — built or modified by humans
  # Organized following Bonneau Part 1: A (conveyance), B (retention),
  # C (distribution)
  # ===================================================================
  hydraulic_features:
    description: "Physical water infrastructure, built or modified by humans"
    terms:

      # --- A. Conveyance: waterways ---
      - id: hf.canal
        label: Canal
        description: "Artificial navigable waterway for irrigation or transport"
        source_terms: {grc: [dioryx, plote, oreine], lat: [fossa], egy: [heni, mou]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/canal
        bonneau_ref: "Part 1.A, p.35-39"
      - id: hf.koiloma
        label: Depression channel
        description: "Low-lying channel or hollow used for water conveyance"
        source_terms: {grc: [koilas, koiloma]}
        bonneau_ref: "Part 1.A, p.40-42"
      - id: hf.aqueduct
        label: Aqueduct / Water conduit
        description: "Conduit for transporting water over distance"
        source_terms: {grc: [hydragogos, hydregos], lat: [aquaeductus]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/aqueduct
        bonneau_ref: "Part 1.A, p.43-44"
      - id: hf.inlet
        label: Inlet channel
        description: "Channel that brings water into an irrigation system"
        source_terms: {grc: [eisagogos]}
        bonneau_ref: "Part 1.A, p.45"
      - id: hf.outlet
        label: Outlet channel
        description: "Channel that carries water away from an irrigation system"
        source_terms: {grc: [exagogos]}
        bonneau_ref: "Part 1.A, p.53"
      - id: hf.channel
        label: Small channel / Stream channel
        description: "Minor constructed or semi-natural channel for directing water"
        source_terms: {grc: [rheithron, ochetos, amara, solen, kremaste]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/channel-artificial
        bonneau_ref: "Part 1.A, p.46-52"
      - id: hf.watering_place
        label: Watering place
        description: "Facility for watering livestock or small-scale irrigation"
        source_terms: {grc: [potistra]}
        bonneau_ref: "Part 1.A, p.48"
      - id: hf.ditch
        label: Ditch
        description: "Narrow excavation for drainage or irrigation"
        source_terms: {lat: [fossa]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/ditch

      # --- B1. Retention: dikes ---
      - id: hf.dike
        label: Dike / Embankment
        description: "Raised earth structure for flood control or water retention"
        source_terms: {grc: [choma, perichoma, parachoma], egy: [teni, ouhemet]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/dam
        bonneau_ref: "Part 1.B.1, p.57-72"
      - id: hf.cross_dike
        label: Cross-dike / Partition dike
        description: "Transverse dike dividing a basin or blocking a channel"
        source_terms: {grc: [emblema, diachoma]}
        bonneau_ref: "Part 1.B.1, p.61-66"
      - id: hf.field_ridge
        label: Field ridge / Boundary bank
        description: "Low earthen ridge separating adjacent fields or plots"
        source_terms: {grc: [gyes, gyos, tainia]}
        bonneau_ref: "Part 1.B.1, p.70-71"
      - id: hf.bridge
        label: Bridge / Bridge-dike
        description: "Structure spanning a waterway, sometimes doubling as a dike"
        source_terms: {grc: [gephyra], lat: [pons]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/bridge
        bonneau_ref: "Part 1.B.1, p.72"

      # --- B2. Retention: basins and reservoirs ---
      - id: hf.basin
        label: Irrigation basin
        description: "Enclosed area for controlled inundation (basin irrigation)"
        source_terms: {grc: [limne]}
        bonneau_ref: "Part 1.B.2, p.74-76"
      - id: hf.reservoir
        label: Reservoir / Tank
        description: "Artificial storage for collected water"
        source_terms: {grc: [hydreuma, hypodocheion, hydrostasion, dexamene, hydrodocheion], lat: [castellum]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/reservoir
        bonneau_ref: "Part 1.B.2, p.77-89"
      - id: hf.well
        label: Well
        description: "Vertical shaft for groundwater access"
        source_terms: {grc: [phrear, krene], lat: [fons]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/well
      - id: hf.cistern
        label: Cistern
        description: "Constructed waterproof receptacle for rainwater or delivered water"
        source_terms: {grc: [hydreuma, lakkos]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/cistern
      - id: hf.nilometer
        label: Nilometer
        description: "Structure for measuring Nile flood levels"
        source_terms: {grc: [neilometrion]}
        bonneau_ref: "Part 2.B.1, p.197-200"

      # --- C1. Distribution: canal mouths and gates ---
      - id: hf.sluice
        label: Sluice gate
        description: "Controllable gate in a canal or dike for regulating water flow"
        source_terms: {grc: [thyra, hexathyros]}
        bonneau_ref: "Part 1.C.1, p.97-98"
      - id: hf.water_release
        label: Water release point
        description: "Point where water is deliberately released into a basin or channel"
        source_terms: {grc: [aphesis, diakomma]}
        bonneau_ref: "Part 1.C.1, p.99-102"
      - id: hf.dike_cut
        label: Deliberate dike cut
        description: "Intentional opening in a dike to direct water flow"
        source_terms: {grc: [diakopos, diakope]}
        bonneau_ref: "Part 1.C.2, p.103-106"
      - id: hf.fountain
        label: Fountain / Spring installation
        description: "Built feature providing access to water from a spring"
        source_terms: {grc: [krene, pege], lat: [fons]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/fountain

      # --- C3. Hydraulic machines ---
      # Bonneau distinguishes six types; we group into four
      - id: hf.shaduf
        label: Shaduf
        description: "Lever-based water-lifting device with counterweight"
        source_terms: {grc: [keloneion]}
        bonneau_ref: "Part 1.C.3, p.115-119"
      - id: hf.archimedean_screw
        label: Archimedean screw
        description: "Helical screw device for lifting water"
        source_terms: {grc: [kochlias]}
        bonneau_ref: "Part 1.C.3, p.119-120"
      - id: hf.water_wheel
        label: Water wheel
        description: "Wheel-based water-lifting device, human- or water-powered"
        source_terms: {grc: [trochos, tympanon]}
        bonneau_ref: "Part 1.C.3, p.120-124"
      - id: hf.saqia
        label: Saqia
        description: "Animal-driven water wheel with chain of pots or buckets"
        source_terms: {grc: [mechane, organon]}
        bonneau_ref: "Part 1.C.3, p.124-137"

      # --- Other ---
      - id: hf.harbor
        label: Harbor / Port
        description: "Waterfront infrastructure for vessels"
        source_terms: {grc: [limen, hormos, oryktos], lat: [portus]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/harbor
      - id: hf.bath
        label: Bath complex
        description: "Public or private bathing facility"
        source_terms: {grc: [balaneion], lat: [thermae, balneum]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/bath

  # ===================================================================
  # WATER BODIES — natural features
  # ===================================================================
  water_bodies:
    description: "Natural water features and landforms (not human-built)"
    terms:
      - id: wb.river
        label: River / Stream
        description: "Natural flowing watercourse, including the Nile and its branches"
        source_terms: {grc: [potamos, megas_potamos, cheimarrous], lat: [flumen, fluvius, amnis, rivus], egy: [ir, mou]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/river
        bonneau_ref: "Part 1.A, p.27-34"
      - id: wb.lake
        label: Lake
        description: "Inland body of standing water"
        source_terms: {grc: [limne], lat: [lacus], egy: [shi]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/lake
      - id: wb.spring
        label: Natural spring
        description: "Water issuing naturally from rock or soil"
        source_terms: {grc: [pege, krene]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/spring
      - id: wb.marsh
        label: Marsh / Wetland
        description: "Area saturated with water, supporting distinct ecology"
        source_terms: {grc: [barathra, drymos]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/marsh-wetland
      - id: wb.nile_mouth
        label: Nile mouth / Delta branch
        description: "Point where a Nile branch enters the sea"
        source_terms: {grc: [stoma, stomion, ostium, pseudostomon]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/mouth
        bonneau_ref: "Part 1.C.1, p.90-95"
      - id: wb.delta
        label: Delta
        description: "Alluvial fan at a river mouth"
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/delta
      - id: wb.wadi
        label: Wadi / Dry riverbed
        description: "Seasonal watercourse, dry most of the year"
        source_terms: {grc: [pharanx], ara: [wadi]}
      - id: wb.cataract
        label: Cataract / Rapids
        description: "Section of river with shallow, turbulent water over rocks"
        source_terms: {grc: [katarraktes], egy: [mou]}
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/rapid
      - id: wb.oasis
        label: Oasis
        description: "Fertile area in desert sustained by groundwater"
        pleiades: https://pleiades.stoa.org/vocabularies/place-types/oasis
      - id: wb.nesos
        label: Nesos (unflooded land)
        description: "Land not reached by the Nile inundation"
        source_terms: {grc: [nesos, ge_epeiros]}

  # ===================================================================
  # HYDROLOGICAL PHENOMENA — natural events and processes
  # ===================================================================
  hydrological_phenomena:
    description: "Natural water events and processes"
    terms:
      - id: hp.inundation
        label: Inundation
        description: "Annual Nile flood event"
      - id: hp.low_water
        label: Low water year
        description: "Below-normal Nile flood, potential famine trigger"
      - id: hp.high_flood
        label: Excessive flood
        description: "Destructively high Nile flood"
      - id: hp.flood_anomaly
        label: Flood anomaly
        description: "Unusual flood timing, pattern, or magnitude"
      - id: hp.siltation
        label: Siltation
        description: "Sediment accumulation in channels or basins"
      - id: hp.salinization
        label: Salinization
        description: "Salt buildup in soil or water"
      - id: hp.drought
        label: Drought
        description: "Extended period of insufficient water"
      - id: hp.erosion
        label: Erosion
        description: "Loss of soil or bank material due to water action"
      - id: hp.breach
        label: Dike breach
        description: "Accidental break in an embankment causing uncontrolled flooding"
        source_terms: {grc: [ekregma, ekchysis, diasphax, ekptoma]}
        bonneau_ref: "Part 1.C.2, p.106-112"
      - id: hp.overflow
        label: Water overflow / Spillage
        description: "Uncontrolled discharge of water over or through infrastructure"
        source_terms: {grc: [ekchysis]}
        bonneau_ref: "Part 1.C.2, p.111"

  # ===================================================================
  # MANAGEMENT PRACTICES — human actions
  # ===================================================================
  management_practices:
    description: "Human actions related to water infrastructure and land"
    terms:
      - id: mp.irrigation
        label: Irrigation
        description: "Planned distribution of water to agricultural fields"
      - id: mp.basin_irrigation
        label: Basin irrigation
        description: "Controlled flooding of enclosed basins for crop watering"
        source_terms: {grc: [limnasmos]}
        bonneau_ref: "Part 2.B.2, p.223-225"
      - id: mp.dredging
        label: Dredging
        description: "Removal of sediment from waterways"
      - id: mp.desilting
        label: De-silting
        description: "Removal of silt and mud from canals and channels"
        source_terms: {grc: [anapsesmos]}
        bonneau_ref: "Part 2.A.2, p.149-151"
      - id: mp.vegetation_clearing
        label: Vegetation clearing
        description: "Removal of plant growth from waterways and dikes"
        source_terms: {grc: [parylismos, aphylismos]}
        bonneau_ref: "Part 2.A.2, p.151-152"
      - id: mp.embankment_repair
        label: Embankment repair
        description: "Maintenance or reconstruction of dikes"
      - id: mp.canal_clearance
        label: Canal clearance
        description: "Cleaning or reopening of canals"
      - id: mp.water_distribution
        label: Water distribution
        description: "Allocation of water among users or regions"
        source_terms: {grc: [hydroparochia]}
        bonneau_ref: "Part 2.C, p.231-238"
      - id: mp.corvee_labor
        label: Corvee labor
        description: "Compulsory labor for infrastructure maintenance"
        source_terms: {grc: [penthemeros, chomatikon]}
        bonneau_ref: "Part 2.A.4, p.174-175"
      - id: mp.tax_remission
        label: Tax remission (flood-related)
        description: "Tax reduction linked to flood failure or damage"
      - id: mp.land_reclamation
        label: Land reclamation
        description: "Converting desert or marsh into cultivable land"
      - id: mp.flood_measurement
        label: Flood measurement
        description: "Observation and recording of Nile flood levels at nilometers"
        source_terms: {grc: [teresis]}
        bonneau_ref: "Part 2.B.1, p.197-210"
      - id: mp.water_lifting
        label: Water lifting
        description: "Raising water from lower to higher level using mechanical devices"
        source_terms: {grc: [antlesis]}
        bonneau_ref: "Part 2.C, p.234-238"
      - id: mp.navigation
        label: Canal navigation
        description: "Use of waterways for transport of goods or persons"

  # ===================================================================
  # PERSONNEL — water-management roles
  # Sources: Bonneau Part 2; Abdelwahed & Shehata (Rosetta 27, 2022)
  # ===================================================================
  personnel:
    description: "Water-management roles attested in administrative documents"
    terms:
      - id: pe.hydrophylax
        label: Water guard
        description: "Official responsible for protecting and distributing water"
        source_terms: {grc: [hydrophylax]}
        bonneau_ref: "Part 2.B.1, p.211-218"
      - id: pe.aigialophylax
        label: Shore guard
        description: "Official guarding riverbanks or lakeshores"
        source_terms: {grc: [aigialophylax]}
        bonneau_ref: "Part 3.A.1, p.262-265"
      - id: pe.potamophylax
        label: River guard
        description: "Official overseeing a section of the Nile or a canal"
        source_terms: {grc: [potamophylax]}
      - id: pe.dike_superintendent
        label: Dike superintendent
        description: "Senior official overseeing dike construction and maintenance"
        source_terms: {grc: [chomatepimelets, chomatepistates]}
        bonneau_ref: "Part 2.A.5, p.158-165"
      - id: pe.dike_builder
        label: Dike builder / Constructor
        description: "Specialist responsible for constructing and repairing dikes"
        source_terms: {grc: [chomatepeiktes]}
        bonneau_ref: "Part 2.A.5, p.183-187"
      - id: pe.neilometres
        label: Nilometer reader
        description: "Official who observes and records Nile flood levels"
        source_terms: {grc: [neilometres]}
        bonneau_ref: "Part 2.B.1, p.207-209"
      - id: pe.limnastes
        label: Basin irrigation manager
        description: "Official managing the controlled flooding of irrigation basins"
        source_terms: {grc: [limnastes]}
        bonneau_ref: "Part 2.B.2, p.225-228"
      - id: pe.geometres
        label: Surveyor
        description: "Land surveyor responsible for measuring and mapping water infrastructure"
        source_terms: {grc: [geometres]}
        bonneau_ref: "Part 2.A.4, p.164-167"
      - id: pe.potamites
        label: Canal worker / Well-digger
        description: "Laborer specializing in canal or well construction"
        source_terms: {grc: [potamites]}
        bonneau_ref: "Part 2.A.3, p.158"
      - id: pe.diver
        label: Diver / Underwater worker
        description: "Laborer working underwater for canal maintenance"
        source_terms: {grc: [nautokolymbetes, kolymbetes]}
        bonneau_ref: "Part 2.A.5, p.195-196"
      - id: pe.irrigation_officer
        label: Irrigation officer
        description: "Official managing water allocation for agriculture"

  # ===================================================================
  # INTERPRETIVE FRAMINGS — properties of the discourse
  # ===================================================================
  interpretive_framings:
    description: >
      Rhetorical or explanatory frameworks through which sources
      present environmental events. These are properties of the
      discourse, not of the physical world.
    terms:
      - id: if.divine_agency
        label: Divine agency
        description: "Event attributed to gods or divine will"
      - id: if.mismanagement
        label: Administrative mismanagement
        description: "Event framed as result of human failure"
      - id: if.natural_cycle
        label: Natural cycle
        description: "Event presented as regular natural occurrence"
      - id: if.moral_exemplum
        label: Moral exemplum
        description: "Event used as moral lesson or warning"
      - id: if.prodigy
        label: Prodigy / Omen
        description: "Event framed as portent or supernatural sign"
      - id: if.royal_beneficence
        label: Royal beneficence
        description: "Infrastructure framed as ruler's gift or achievement"
      - id: if.famine_narrative
        label: Famine narrative
        description: "Event framed within a conventional famine or scarcity topos"
      - id: if.abundance_topos
        label: Abundance topos
        description: "Event framed as evidence of prosperity or divine favor"

# ===================================================================
# EVIDENCE LAYERS
# ===================================================================
evidence_layers:
  description: >
    Every annotation is assigned exactly one evidence layer.
    This keeps attestations, inferences, and framings analytically distinct.
  layers:
    - id: attestation
      label: Attestation
      description: >
        What the passage directly says. Anchored to specific text,
        with stable pointers (CTS/TEI refs) and provenance metadata.
    - id: inference
      label: Inference
      description: >
        Hypothesis derived from one or more attestations, whether
        proposed by scholars or suggested by computational models.
        Explicitly marked as non-direct observation.
    - id: framing
      label: Framing
      description: >
        The rhetorical or explanatory grammar of the passage.
        Stored as interpretive metadata about the attestation,
        not as a property of the physical world.
